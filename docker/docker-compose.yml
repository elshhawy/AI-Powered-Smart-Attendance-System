# docker/docker-compose.yml
services:

  # ── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:15
    container_name: attendance_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: attendance_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d attendance_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FastAPI ──────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: attendance_api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/attendance_db
    volumes:
      - ../data:/app/data
      - ..:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -m alembic upgrade head &&
             python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # ── React Frontend ───────────────────────────────────────────
  react:
    build:
      context: ..
      dockerfile: docker/Dockerfile.react
    container_name: attendance_ui
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_KIOSK_KEY: kiosk-secret-key-change-this-in-production-123
      VITE_GOOGLE_CLIENT_ID: "535646474910-hei55bgq89lr5paqdf0o6gu92s62jest.apps.googleusercontent.com"
    volumes:
      - ../view_react:/app/view_react
      - /app/view_react/node_modules
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: on-failure:5

volumes:
  postgres_data: